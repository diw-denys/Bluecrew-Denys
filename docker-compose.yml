services:
  backend:
    build: 
      context: ./Backend-Spring-Boot/Bluecrew-api/api
    container_name: spring-api
    networks:
      - app-network
    volumes:
      - uploads_volume:/app/uploads

  frontend:
    build: ./Frontend-React
    container_name: react-web
    depends_on:
      - backend
    networks:
      - app-network

  admin-web:
    build: ./bluecrew-admin
    container_name: angular-admin
    depends_on:
      - backend
    networks:
      - app-network

  nginx-proxy:
    image: nginx:alpine
    container_name: bluecrew_proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_volume:/data/uploads:ro 
    depends_on:
      - frontend
      - admin-web
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  uploads_volume: